# Deploy FastAPI backend to Azure App Service (Linux, Python).
#
# REQUIRED (one secret on GitHub):
#   Settings → Secrets and variables → Actions → Repository secrets
#   Name:  AZURE_WEBAPP_PUBLISH_PROFILE  (exact spelling)
#   Value: full contents of the file from Azure → libra-api → Get publish profile
#          (SCM Basic Auth must be On in App Service Configuration if download was blocked)
#
# If deploy fails with HTTP 403: fix Azure networking + SCM (see docs/AZURE-DEPLOY-403.md).
# Linux: set app setting WEBSITE_WEBDEPLOY_USE_SCM=true before relying on publish profile.

name: Deploy Python to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      actions_step_debug:
        description: 'Verbose runner logs (ACTIONS_STEP_DEBUG)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # workflow_dispatch only; empty on push → false
      ACTIONS_STEP_DEBUG: ${{ github.event.inputs.actions_step_debug || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify publish profile secret is set
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$PUBLISH_PROFILE" ]; then
            echo "::error::Missing GitHub secret AZURE_WEBAPP_PUBLISH_PROFILE."
            echo "Add it: Repo → Settings → Secrets and variables → Actions → New repository secret."
            echo "Name must be exactly: AZURE_WEBAPP_PUBLISH_PROFILE"
            echo "Value: entire .PublishSettings XML from Azure (Get publish profile)."
            exit 1
          fi

      - name: Publish profile diagnostics (no secrets printed)
        env:
          PP: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          echo "::group::Publish profile checks"
          echo "Secret length (characters): ${#PP}"
          if echo "$PP" | grep -q '<publishData'; then echo "OK: contains <publishData"; else echo "::warning::Missing <publishData> — secret may be truncated"; fi
          echo "publishMethod attributes found:"
          echo "$PP" | grep -oE 'publishMethod="[^"]+"' | sort -u || true
          echo "::endgroup::"

      # Do not set type: ZIP with package: . — v3 then treats . as a zip file → EISDIR. Folder deploy is default.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'libra-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
