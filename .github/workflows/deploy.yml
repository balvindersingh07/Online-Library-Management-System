name: Deploy to Azure Web App

# Node API + publish profile (no azure/login).
# Azure Portal: Stack = Node 20 LTS, Startup command = npm start

# app-name matches Azure Web App `libra-api-UNIQUE` (edit if you rename the app).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Require publish profile secret
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: test -n "$PUBLISH_PROFILE" || (echo "::error::Missing AZURE_WEBAPP_PUBLISH_PROFILE" && exit 1)

      - name: Publish profile must match Web App libra-api-UNIQUE
        env:
          PP: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if ! echo "$PP" | grep -qi 'libra-api-unique'; then
            echo "::error::Publish profile XML must be for app libra-api-UNIQUE (see Azure → Get publish profile)."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: libra-api-UNIQUE
          resource-group-name: rg-library-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
          clean: true
          restart: true
